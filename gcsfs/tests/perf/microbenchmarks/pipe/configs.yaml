common:
  bucket_types:
    - "regional"
    - "zonal"
  file_sizes_mb:
    - 512 # 512 MB
  chunk_sizes_mb:
    - 50 # 50 MB Default chunk size
  rounds: 3

scenarios:
  - name: "pipe_file"

  - name: "pipe_file_multi_process"
    processes: [4, 8] # Scaled down concurrent processes to prevent OOM crashes on large contiguous byte buffers
