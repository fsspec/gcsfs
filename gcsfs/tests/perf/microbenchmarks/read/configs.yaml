common:
  bucket_types:
    - "regional"
    - "zonal"
  file_sizes_mb:
    - 20480 # 20 GB
  chunk_sizes_mb:
    - 0.0625
    - 1
    - 16
    - 100
  rounds: 5
  runtime: 30 # 30 secs

scenarios:
  - name: "read_seq_fixed_duration"
    pattern: "seq"
    processes: [1, 16, 48]
    files: 1

  - name: "read_rand_fixed_duration"
    pattern: "rand"
    processes: [1, 16, 48]
    files: 1
