common:
  bucket_types:
    - "regional"
    - "zonal"
    - "hns"
  files:
    - 100
  folders:
    - 100

scenarios:
  - name: "info"
    pattern: "info"
    depth: 1

  - name: "info_deep"
    pattern: "info"
    depth: 10

  - name: "info_multi_process"
    pattern: "info"
    depth: 1
    processes: [4, 8]

  - name: "info_multi_process_deep"
    pattern: "info"
    depth: 10
    processes: [4, 8]
