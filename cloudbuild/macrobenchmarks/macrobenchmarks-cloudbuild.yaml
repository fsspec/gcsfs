substitutions:
  _INFRA_PREFIX: ""
  _ZONE: ""
  _GKE_SERVICE_ACCOUNT: ""
  _WORKLOAD: "hf-pytorch-lightning-cpu"
  _BUCKET_TYPE: "regional"
  _MACHINE_TYPE: "c4-standard-192"
  _ENABLE_TIER1_NETWORKING: "true"
  # 2 nodes x 4 ranks/node = 8-rank world. Ranks/node is capped at 4 (in the
  # workload chart) because a restoring run's per-rank peak RSS ~doubles to
  # ~92GB (resident model+optimizer plus the torch.load'd checkpoint), and
  # 8 ranks x 92GB OOMs the 720GB c4-standard-192. See values_base.yaml.
  _NODES: "2"
  _RANKS_PER_NODE: "4"
  _STEPS: "100"
  _CHECKPOINT_INTERVAL: "25"
  _CKPT_TO_KEEP: "1"
  _DATASET_PATH: ""
  _MODEL_ID: "gs://huggingface-model-weights/Llama-3.1-8B"
  _HF_TOKEN: ""
  # Optional external gs:// checkpoint to resume from, exercising the restore IO
  # path. When set it takes precedence over _SEED_CHECKPOINT (the seed step
  # no-ops) and must point at a checkpoint that outlives the run (e.g. a seeded
  # bucket). Empty (default) => with _SEED_CHECKPOINT=true, restore from an
  # auto-generated per-run seed; with _SEED_CHECKPOINT=false, fresh run / no restore.
  _CHECKPOINT_LOAD_PATH: ""
  _REQUIREMENTS: ""
  _IMAGE: "nvcr.io/nvidia/pytorch:26.05-py3"
  _TRAINING_STRATEGY: "ddp"
  # ModelParallelStrategy mesh (model_parallel_* only). TP x DP must equal
  # _NODES x _RANKS_PER_NODE. Default: TP=4 intra-node, DP=2 across nodes.
  _TENSOR_PARALLEL_SIZE: "4"
  _DATA_PARALLEL_SIZE: "2"
  # Auto-generate a per-run seed checkpoint and restore from it (measures the
  # restore IO path) when no external _CHECKPOINT_LOAD_PATH is supplied. Set to
  # "false" for a fresh-run baseline with no restore.
  _SEED_CHECKPOINT: "true"
  _SIMULATED_STEP_COMPUTE_SECONDS: "1.0"
  # Per-rank micro-batch, optimizer-step accumulation, and dataloader workers.
  # _GRAD_ACCUM defaults to 1 to match the launcher's effective value; the
  # sim's getenv default is overridden by the launcher.
  _PER_DEVICE_BATCH: "8"
  _GRAD_ACCUM: "1"
  _DATALOADER_WORKERS: "16"
  # Passes over the dataset. Binds only if _STEPS: "-1".
  _EPOCHS: "3"
  # HF streaming shuffle buffer size (0 to disable). Seed is fixed at 42.
  _SHUFFLE_BUFFER_SIZE: "10000"
  # Batches to prefetch per dataloader worker.
  _DATALOADER_PREFETCH_FACTOR: "2"
  _JOBSET_VERSION: "v0.12.0"
  _SKIP_CLEANUP: "false"

# Each step's logic lives in scripts/<step>.sh; the step bodies below are just
# the env wiring (Cloud Build substitutions reach the scripts as environment
# variables) plus dependency ordering. See scripts/lib.sh.
steps:
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "init-variables"
    entrypoint: "bash"
    env:
      - "PROJECT_ID=${PROJECT_ID}"
      - "BUILD_ID=${BUILD_ID}"
      - "BRANCH_NAME=${BRANCH_NAME}"
      - "_INFRA_PREFIX=${_INFRA_PREFIX}"
      - "_ZONE=${_ZONE}"
      - "_GKE_SERVICE_ACCOUNT=${_GKE_SERVICE_ACCOUNT}"
      - "_DATASET_PATH=${_DATASET_PATH}"
      - "_REQUIREMENTS=${_REQUIREMENTS}"
      - "_BUCKET_TYPE=${_BUCKET_TYPE}"
      - "_MACHINE_TYPE=${_MACHINE_TYPE}"
      - "_NODES=${_NODES}"
      - "_RANKS_PER_NODE=${_RANKS_PER_NODE}"
      - "_STEPS=${_STEPS}"
      - "_CHECKPOINT_INTERVAL=${_CHECKPOINT_INTERVAL}"
      - "_CKPT_TO_KEEP=${_CKPT_TO_KEEP}"
      - "_CHECKPOINT_LOAD_PATH=${_CHECKPOINT_LOAD_PATH}"
      - "_MODEL_ID=${_MODEL_ID}"
      - "_TRAINING_STRATEGY=${_TRAINING_STRATEGY}"
      - "_TENSOR_PARALLEL_SIZE=${_TENSOR_PARALLEL_SIZE}"
      - "_DATA_PARALLEL_SIZE=${_DATA_PARALLEL_SIZE}"
      - "_SEED_CHECKPOINT=${_SEED_CHECKPOINT}"
      - "_ENABLE_TIER1_NETWORKING=${_ENABLE_TIER1_NETWORKING}"
      - "_SIMULATED_STEP_COMPUTE_SECONDS=${_SIMULATED_STEP_COMPUTE_SECONDS}"
      - "_PER_DEVICE_BATCH=${_PER_DEVICE_BATCH}"
      - "_GRAD_ACCUM=${_GRAD_ACCUM}"
      - "_DATALOADER_WORKERS=${_DATALOADER_WORKERS}"
      - "_EPOCHS=${_EPOCHS}"
      - "_SHUFFLE_BUFFER_SIZE=${_SHUFFLE_BUFFER_SIZE}"
      - "_DATALOADER_PREFETCH_FACTOR=${_DATALOADER_PREFETCH_FACTOR}"
    args: ["cloudbuild/macrobenchmarks/scripts/init_variables.sh"]
    waitFor: ["-"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "cleanup-leaked-resources"
    entrypoint: "bash"
    allowFailure: true
    env:
      - "PROJECT_ID=${PROJECT_ID}"
      - "_INFRA_PREFIX=${_INFRA_PREFIX}"
    args: ["cloudbuild/macrobenchmarks/scripts/cleanup_leaked_resources.sh"]
    waitFor: ["init-variables"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "create-buckets"
    entrypoint: "bash"
    allowFailure: true
    env:
      - "PROJECT_ID=${PROJECT_ID}"
      - "LOCATION=${LOCATION}"
      - "_BUCKET_TYPE=${_BUCKET_TYPE}"
      - "_ZONE=${_ZONE}"
      - "_DATASET_PATH=${_DATASET_PATH}"
    args: ["cloudbuild/macrobenchmarks/scripts/create_buckets.sh"]
    waitFor: ["init-variables"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "create-cluster"
    entrypoint: "bash"
    allowFailure: true
    env:
      - "PROJECT_ID=${PROJECT_ID}"
      - "_ZONE=${_ZONE}"
      - "_GKE_SERVICE_ACCOUNT=${_GKE_SERVICE_ACCOUNT}"
      - "_MACHINE_TYPE=${_MACHINE_TYPE}"
      - "_NODES=${_NODES}"
      - "_JOBSET_VERSION=${_JOBSET_VERSION}"
      - "_ENABLE_TIER1_NETWORKING=${_ENABLE_TIER1_NETWORKING}"
    args: ["cloudbuild/macrobenchmarks/scripts/create_cluster.sh"]
    waitFor: ["init-variables"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "seed-checkpoint"
    entrypoint: "bash"
    allowFailure: true
    env:
      - "PROJECT_ID=${PROJECT_ID}"
      - "_ZONE=${_ZONE}"
      - "_WORKLOAD=${_WORKLOAD}"
      - "_DATASET_PATH=${_DATASET_PATH}"
      - "_MODEL_ID=${_MODEL_ID}"
      - "_IMAGE=${_IMAGE}"
      - "_TRAINING_STRATEGY=${_TRAINING_STRATEGY}"
      - "_TENSOR_PARALLEL_SIZE=${_TENSOR_PARALLEL_SIZE}"
      - "_DATA_PARALLEL_SIZE=${_DATA_PARALLEL_SIZE}"
      - "_HF_TOKEN=${_HF_TOKEN}"
      - "_NODES=${_NODES}"
      - "_RANKS_PER_NODE=${_RANKS_PER_NODE}"
      - "_MACHINE_TYPE=${_MACHINE_TYPE}"
      - "_REQUIREMENTS=${_REQUIREMENTS}"
      - "_SEED_CHECKPOINT=${_SEED_CHECKPOINT}"
      - "_CHECKPOINT_LOAD_PATH=${_CHECKPOINT_LOAD_PATH}"
      # Seed and measured runs must use identical shard order for restore.
      - "_EPOCHS=${_EPOCHS}"
      - "_SHUFFLE_BUFFER_SIZE=${_SHUFFLE_BUFFER_SIZE}"
      - "_DATALOADER_PREFETCH_FACTOR=${_DATALOADER_PREFETCH_FACTOR}"
    args: ["cloudbuild/macrobenchmarks/scripts/seed_checkpoint.sh"]
    waitFor: ["create-cluster", "create-buckets"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "run-workload"
    entrypoint: "bash"
    allowFailure: true
    env:
      - "PROJECT_ID=${PROJECT_ID}"
      - "_ZONE=${_ZONE}"
      - "_WORKLOAD=${_WORKLOAD}"
      - "_DATASET_PATH=${_DATASET_PATH}"
      - "_CHECKPOINT_LOAD_PATH=${_CHECKPOINT_LOAD_PATH}"
      - "_MODEL_ID=${_MODEL_ID}"
      - "_TRAINING_STRATEGY=${_TRAINING_STRATEGY}"
      - "_TENSOR_PARALLEL_SIZE=${_TENSOR_PARALLEL_SIZE}"
      - "_DATA_PARALLEL_SIZE=${_DATA_PARALLEL_SIZE}"
      - "_SIMULATED_STEP_COMPUTE_SECONDS=${_SIMULATED_STEP_COMPUTE_SECONDS}"
      - "_HF_TOKEN=${_HF_TOKEN}"
      - "_STEPS=${_STEPS}"
      - "_CHECKPOINT_INTERVAL=${_CHECKPOINT_INTERVAL}"
      - "_CKPT_TO_KEEP=${_CKPT_TO_KEEP}"
      - "_MACHINE_TYPE=${_MACHINE_TYPE}"
      - "_NODES=${_NODES}"
      - "_RANKS_PER_NODE=${_RANKS_PER_NODE}"
      - "_REQUIREMENTS=${_REQUIREMENTS}"
      - "_SEED_CHECKPOINT=${_SEED_CHECKPOINT}"
      - "_IMAGE=${_IMAGE}"
      - "_PER_DEVICE_BATCH=${_PER_DEVICE_BATCH}"
      - "_GRAD_ACCUM=${_GRAD_ACCUM}"
      - "_DATALOADER_WORKERS=${_DATALOADER_WORKERS}"
      - "_EPOCHS=${_EPOCHS}"
      - "_SHUFFLE_BUFFER_SIZE=${_SHUFFLE_BUFFER_SIZE}"
      - "_DATALOADER_PREFETCH_FACTOR=${_DATALOADER_PREFETCH_FACTOR}"
    args: ["cloudbuild/macrobenchmarks/scripts/run_workload.sh"]
    waitFor: ["seed-checkpoint"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "scrape-metrics"
    entrypoint: "bash"
    allowFailure: true
    env:
      - "PROJECT_ID=${PROJECT_ID}"
      - "_STEPS=${_STEPS}"
      - "_CHECKPOINT_INTERVAL=${_CHECKPOINT_INTERVAL}"
      - "_CKPT_TO_KEEP=${_CKPT_TO_KEEP}"
      - "_CHECKPOINT_LOAD_PATH=${_CHECKPOINT_LOAD_PATH}"
      - "_SEED_CHECKPOINT=${_SEED_CHECKPOINT}"
      - "_WORKLOAD=${_WORKLOAD}"
      - "_REQUIREMENTS=${_REQUIREMENTS}"
      - "_IMAGE=${_IMAGE}"
      - "_BUCKET_TYPE=${_BUCKET_TYPE}"
      - "_MACHINE_TYPE=${_MACHINE_TYPE}"
      - "_ZONE=${_ZONE}"
      - "_NODES=${_NODES}"
      - "_RANKS_PER_NODE=${_RANKS_PER_NODE}"
      - "_DATASET_PATH=${_DATASET_PATH}"
      - "_MODEL_ID=${_MODEL_ID}"
      - "_TRAINING_STRATEGY=${_TRAINING_STRATEGY}"
      - "_TENSOR_PARALLEL_SIZE=${_TENSOR_PARALLEL_SIZE}"
      - "_DATA_PARALLEL_SIZE=${_DATA_PARALLEL_SIZE}"
      - "_SIMULATED_STEP_COMPUTE_SECONDS=${_SIMULATED_STEP_COMPUTE_SECONDS}"
      - "_PER_DEVICE_BATCH=${_PER_DEVICE_BATCH}"
      - "_GRAD_ACCUM=${_GRAD_ACCUM}"
      - "_DATALOADER_WORKERS=${_DATALOADER_WORKERS}"
      - "_EPOCHS=${_EPOCHS}"
      - "_SHUFFLE_BUFFER_SIZE=${_SHUFFLE_BUFFER_SIZE}"
      - "_DATALOADER_PREFETCH_FACTOR=${_DATALOADER_PREFETCH_FACTOR}"
    args: ["cloudbuild/macrobenchmarks/scripts/scrape_metrics.sh"]
    waitFor: ["run-workload"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "cleanup-helm"
    entrypoint: "bash"
    env:
      - "PROJECT_ID=${PROJECT_ID}"
      - "_ZONE=${_ZONE}"
      - "_SKIP_CLEANUP=${_SKIP_CLEANUP}"
    args: ["cloudbuild/macrobenchmarks/scripts/cleanup_helm.sh"]
    waitFor: ["scrape-metrics"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "cleanup-cluster"
    entrypoint: "bash"
    env:
      - "PROJECT_ID=${PROJECT_ID}"
      - "_ZONE=${_ZONE}"
      - "_SKIP_CLEANUP=${_SKIP_CLEANUP}"
    args: ["cloudbuild/macrobenchmarks/scripts/cleanup_cluster.sh"]
    waitFor: ["cleanup-helm"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "delete-buckets"
    entrypoint: "bash"
    env:
      - "PROJECT_ID=${PROJECT_ID}"
      - "_SKIP_CLEANUP=${_SKIP_CLEANUP}"
    args: ["cloudbuild/macrobenchmarks/scripts/delete_buckets.sh"]
    waitFor: ["scrape-metrics"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "check-failure"
    entrypoint: "bash"
    args: ["cloudbuild/macrobenchmarks/scripts/check_failure.sh"]
    waitFor: ["cleanup-cluster", "delete-buckets"]

timeout: "21600s"

options:
  logging: CLOUD_LOGGING_ONLY
  pool:
    name: "projects/${PROJECT_ID}/locations/${LOCATION}/workerPools/cloud-build-worker-pool"
