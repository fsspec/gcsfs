substitutions:
  _REGION: "us-central1"
  _ZONE: "us-central1-a"
  _SHORT_BUILD_ID: ${BUILD_ID:0:8}

steps:
  # Generate a persistent SSH key for this build run.
  # This prevents gcloud from adding a new key to the OS Login profile on every ssh/scp command.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "generate-ssh-key"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        mkdir -p /workspace/.ssh
        # Generate the SSH key
        ssh-keygen -t rsa -f /workspace/.ssh/google_compute_engine -N '' -C gcb
        # Save the public key content to a file for the cleanup step
        cat /workspace/.ssh/google_compute_engine.pub > /workspace/gcb_ssh_key.pub
    waitFor: ["-"]

  # Create all necessary GCS buckets in parallel.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "create-buckets"
    entrypoint: "bash"
    args: ["cloudbuild/create_resources.sh"]
    env:
      - "PROJECT_ID=${PROJECT_ID}"
      - "REGION=${_REGION}"
      - "ZONE=${_ZONE}"
      - "SHORT_BUILD_ID=${_SHORT_BUILD_ID}"
    waitFor: ["-"]

  # Create a GCE VM to run the tests.
  # The VM is created in the same zone as the zonal bucket to test rapid storage features.
  # It's given the 'cloud-platform' scope to allow it to access GCS and other services.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "create-vm"
    entrypoint: "gcloud"
    args:
      - "compute"
      - "instances"
      - "create"
      - "gcsfs-test-vm-${_SHORT_BUILD_ID}"
      - "--project=${PROJECT_ID}"
      - "--zone=${_ZONE}"
      - "--machine-type=n2-standard-4"
      - "--image-family=debian-13"
      - "--image-project=debian-cloud"
      - "--service-account=${_ZONAL_VM_SERVICE_ACCOUNT}"
      - "--scopes=https://www.googleapis.com/auth/cloud-platform" # Full access to project APIs
      - "--metadata=enable-oslogin=TRUE"
    waitFor: ["-"]

  # Set up the VM for integration tests.
  # This step uses 'gcloud compute ssh' to execute a script.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "setup-vm"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        # Wait for SSH
        bash cloudbuild/wait_for_ssh.sh "gcsfs-test-vm-${_SHORT_BUILD_ID}" "${_ZONE}"

        # Copy entire repo to VM
        gcloud compute scp --recurse . gcsfs-test-vm-${_SHORT_BUILD_ID}:~ --zone=${_ZONE} --internal-ip --ssh-key-file=/workspace/.ssh/google_compute_engine

        # Run Setup Script remotely
        gcloud compute ssh gcsfs-test-vm-${_SHORT_BUILD_ID} --zone=${_ZONE} --internal-ip --ssh-key-file=/workspace/.ssh/google_compute_engine --command="bash cloudbuild/setup_vm.sh"
    waitFor: ["create-vm", "generate-ssh-key"]

  # 5. Run Tests (Parallel Blocks)
  # We reuse a single remote runner script, passing env vars to control which suite runs.

  # Standard Tests
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "run-standard-tests"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        echo "--- Skipping Standard Tests ---"
        exit 0
        gcloud compute ssh gcsfs-test-vm-${_SHORT_BUILD_ID} --zone=${_ZONE} --internal-ip --ssh-key-file=/workspace/.ssh/google_compute_engine \
        --command="export TEST_SUITE='standard' SHORT_BUILD_ID='${_SHORT_BUILD_ID}' PROJECT_ID='${PROJECT_ID}' REGION='${_REGION}' KEY_RING='${_GCSFS_KEY_RING_NAME}' KEY_NAME='${_GCSFS_KEY_NAME}' && bash cloudbuild/run_tests.sh"
    waitFor: ["setup-vm", "create-buckets"]

  # Zonal Tests
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "run-zonal-tests"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        echo "--- Skipping Zonal Tests ---"
        exit 0
        gcloud compute ssh gcsfs-test-vm-${_SHORT_BUILD_ID} --zone=${_ZONE} --internal-ip --ssh-key-file=/workspace/.ssh/google_compute_engine \
        --command="export TEST_SUITE='zonal' SHORT_BUILD_ID='${_SHORT_BUILD_ID}' PROJECT_ID='${PROJECT_ID}' REGION='${_REGION}' KEY_RING='${_GCSFS_KEY_RING_NAME}' KEY_NAME='${_GCSFS_KEY_NAME}' && bash cloudbuild/run_tests.sh"
    waitFor: ["setup-vm", "create-buckets"]

  # Zonal Core Tests
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "run-zonal-core-tests"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud compute ssh gcsfs-test-vm-${_SHORT_BUILD_ID} --zone=${_ZONE} --internal-ip --ssh-key-file=/workspace/.ssh/google_compute_engine \
        --command="export TEST_SUITE='zonal_core' SHORT_BUILD_ID='${_SHORT_BUILD_ID}' PROJECT_ID='${PROJECT_ID}' REGION='${_REGION}' KEY_RING='${_GCSFS_KEY_RING_NAME}' KEY_NAME='${_GCSFS_KEY_NAME}' && bash cloudbuild/run_tests.sh"
    waitFor: ["setup-vm", "create-buckets"]

  # HNS Tests
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "run-hns-tests"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        echo "--- Skipping HNS Tests ---"
        exit 0
        gcloud compute ssh gcsfs-test-vm-${_SHORT_BUILD_ID} --zone=${_ZONE} --internal-ip --ssh-key-file=/workspace/.ssh/google_compute_engine \
        --command="export TEST_SUITE='hns' SHORT_BUILD_ID='${_SHORT_BUILD_ID}' PROJECT_ID='${PROJECT_ID}' REGION='${_REGION}' KEY_RING='${_GCSFS_KEY_RING_NAME}' KEY_NAME='${_GCSFS_KEY_NAME}' && bash cloudbuild/run_tests.sh"
    waitFor: ["setup-vm", "create-buckets"]

  # 6. Cleanup
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "cleanup"
    entrypoint: "bash"
    args: ["cloudbuild/cleanup.sh"]
    env:
      - "SHORT_BUILD_ID=${_SHORT_BUILD_ID}"
      - "ZONE=${_ZONE}"
    waitFor: ["run-standard-tests", "run-zonal-tests", "run-hns-tests", "run-zonal-core-tests"]

timeout: "3600s"
options:
  logging: CLOUD_LOGGING_ONLY
  pool:
    name: "projects/${PROJECT_ID}/locations/us-central1/workerPools/cloud-build-worker-pool"
