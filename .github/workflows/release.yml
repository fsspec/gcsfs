name: Release

# Triggered by a tag push, this workflow creates a GitHub release
# and publishes the package to PyPI.
on:
  push:
    tags:
      - '2[0-9][0-9][0-9].[0-9].[0-9]*'
      - '2[0-9][0-9][0-9].[0-9][0-9].[0-9]*'

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e-tests:
    name: Wait for E2E Integration Tests (Cloud Build)
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: read
      checks: read
    steps:
      - name: Wait for Google Cloud Build check to pass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_SHA="${{ github.sha }}"
          POLL_INTERVAL=120
          TIMEOUT=2700

          echo "Waiting for Cloud Build check to complete for commit ${COMMIT_SHA}..."
          START_TIME=$(date +%s)

          while true; do
            API_RESPONSE=$(gh api "repos/${{ github.repository }}/commits/${COMMIT_SHA}/check-runs?per_page=100" 2>&1)
            API_EXIT_CODE=$?
            if [ $API_EXIT_CODE -eq 0 ]; then
              CHECK_RUNS_JSON="$API_RESPONSE"
            else
              echo "⚠️ Warning: gh api call failed with exit status $API_EXIT_CODE. Error: $API_RESPONSE"
              CHECK_RUNS_JSON=""
            fi

            if [ -n "$CHECK_RUNS_JSON" ]; then
              LATEST_CHECK_RUNS=$(echo "$CHECK_RUNS_JSON" | jq -r '[.check_runs[] | select(.app.slug == "google-cloud-build")] | group_by(.name) | map(sort_by(.id) | last) | .[] | "\(.name):\(.status):\(.conclusion)"' 2>/dev/null)
            else
              LATEST_CHECK_RUNS=""
            fi

            if [ -n "$LATEST_CHECK_RUNS" ]; then
              ALL_CHECKS_PASSED=true
              ANY_CHECK_FAILED=false
              FAILED_CHECK_NAME=""
              FAILED_CHECK_CONCLUSION=""
              ANY_CHECK_IN_PROGRESS=false

              while IFS= read -r CHECK_RUN_RECORD; do
                [ -z "$CHECK_RUN_RECORD" ] && continue
                CHECK_NAME=$(echo "$CHECK_RUN_RECORD" | cut -d':' -f1)
                CHECK_STATUS=$(echo "$CHECK_RUN_RECORD" | cut -d':' -f2)
                CHECK_CONCLUSION=$(echo "$CHECK_RUN_RECORD" | cut -d':' -f3)

                echo "Found Cloud Build check run: $CHECK_NAME. Status: $CHECK_STATUS, Conclusion: $CHECK_CONCLUSION"

                if [ "$CHECK_STATUS" = "completed" ]; then
                  if [ "$CHECK_CONCLUSION" != "success" ]; then
                    ALL_CHECKS_PASSED=false
                    ANY_CHECK_FAILED=true
                    FAILED_CHECK_NAME="$CHECK_NAME"
                    FAILED_CHECK_CONCLUSION="$CHECK_CONCLUSION"
                  fi
                else
                  ALL_CHECKS_PASSED=false
                  ANY_CHECK_IN_PROGRESS=true
                fi
              done <<< "$LATEST_CHECK_RUNS"

              if [ "$ALL_CHECKS_PASSED" = true ]; then
                echo "✅ All Cloud Build checks passed!"
                exit 0
              elif [ "$ANY_CHECK_FAILED" = true ]; then
                echo "❌ Cloud Build check '$FAILED_CHECK_NAME' failed with conclusion: $FAILED_CHECK_CONCLUSION"
                exit 1
              elif [ "$ANY_CHECK_IN_PROGRESS" = true ]; then
                echo "Waiting for all Cloud Build checks to complete..."
              fi
            else
              echo "Waiting for Cloud Build check(s) to appear..."
            fi

            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
              echo "❌ Timeout waiting for Cloud Build check after ${TIMEOUT} seconds."
              exit 1
            fi

            sleep "$POLL_INTERVAL"
          done

  build:
    name: Build artifacts
    needs: [ci, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

