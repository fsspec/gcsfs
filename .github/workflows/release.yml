name: Release

# Triggered by a tag push, this workflow creates a GitHub release
# and publishes the package to PyPI.
on:
  push:
    tags:
      - '2[0-9][0-9][0-9].[0-9].[0-9]*'
      - '2[0-9][0-9][0-9].[0-9][0-9].[0-9]*'

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e-tests:
    name: Wait for E2E Integration Tests (Cloud Build)
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: read
      checks: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v5
      - name: Wait for Google Cloud Build check to pass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/workflows/wait_for_cloud_build.sh

  build:
    name: Build artifacts
    needs: [ci, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    name: Create Release
    needs: build
    if: "!contains(github.ref_name, 'dev') && github.event_name == 'push'"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  publish:
    name: Upload release to PyPI
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
